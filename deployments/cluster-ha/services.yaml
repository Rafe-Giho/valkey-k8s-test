apiVersion: v1
kind: Service
metadata:
  name: valkey-cluster-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: valkey-cluster-ha
    app.kubernetes.io/component: valkey
  ports:
    - name: client
      port: 6379
      targetPort: 6379
    - name: bus
      port: 16379
      targetPort: 16379
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-cluster
spec:
  selector:
    app.kubernetes.io/name: valkey-cluster-ha
    app.kubernetes.io/component: valkey
  ports:
    - name: client
      port: 6379
      targetPort: 6379
