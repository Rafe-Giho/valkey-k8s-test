apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-cache-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey-cache-tester
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey-cache-tester
    spec:
      containers:
        - name: app
          image: shinkiho/valkey-cache-tester:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: valkey-cache-tester-config
            - secretRef:
                name: valkey-cache-tester-secret
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
