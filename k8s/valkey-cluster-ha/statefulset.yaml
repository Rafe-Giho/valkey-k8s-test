apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey-cluster
spec:
  serviceName: valkey-cluster-headless
  replicas: 6
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey-cluster-ha
      app.kubernetes.io/component: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey-cluster-ha
        app.kubernetes.io/component: valkey
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: valkey-cluster-ha
                    app.kubernetes.io/component: valkey
      containers:
        - name: valkey
          image: docker.io/valkey/valkey:9.0.3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /opt/scripts/start-valkey.sh
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-auth
                  key: password
          ports:
            - name: client
              containerPort: 6379
            - name: bus
              containerPort: 16379
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: scripts
              mountPath: /opt/scripts
      volumes:
        - name: scripts
          configMap:
            name: valkey-cluster-scripts
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: csi-storageclass
        resources:
          requests:
            storage: 20Gi
