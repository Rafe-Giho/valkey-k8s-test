<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="520" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Valkey Cluster HA</text>

  <!-- Namespace box -->
  <rect x="20" y="55" width="820" height="440" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="75" font-size="11" fill="#2563eb" font-weight="bold">namespace: valkey-cluster-ha</text>

  <!-- Client -->
  <rect x="44" y="88" width="130" height="80" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="109" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Client</text>
  <text x="109" y="130" text-anchor="middle" font-size="10" fill="#64748b">(Cache Tester)</text>
  <text x="109" y="148" text-anchor="middle" font-size="10" fill="#64748b">cluster-aware</text>

  <!-- Service: seed -->
  <rect x="240" y="88" width="200" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="340" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Service: valkey-cluster</text>
  <text x="340" y="120" text-anchor="middle" font-size="10" fill="#1d4ed8">seed endpoint :6379</text>

  <!-- Service: headless -->
  <rect x="460" y="88" width="220" height="40" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="570" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">Headless: valkey-cluster-headless</text>
  <text x="570" y="120" text-anchor="middle" font-size="10" fill="#0369a1">node discovery</text>

  <!-- Arrow: client -> seed service -->
  <line x1="174" y1="118" x2="238" y2="108" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Bootstrap Job -->
  <rect x="700" y="88" width="120" height="40" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="760" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Job: bootstrap</text>
  <text x="760" y="120" text-anchor="middle" font-size="10" fill="#92400e">cluster create</text>

  <!-- Slot labels -->
  <text x="200" y="172" text-anchor="middle" font-size="10" fill="#475569" font-weight="bold">Slot 0 ~ 5460</text>
  <text x="430" y="172" text-anchor="middle" font-size="10" fill="#475569" font-weight="bold">Slot 5461 ~ 10922</text>
  <text x="660" y="172" text-anchor="middle" font-size="10" fill="#475569" font-weight="bold">Slot 10923 ~ 16383</text>

  <!-- Shard 0: Primary valkey-0 -->
  <rect x="100" y="185" width="200" height="110" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="200" y="207" text-anchor="middle" font-size="12" font-weight="bold" fill="#c2410c">valkey-0</text>
  <text x="200" y="225" text-anchor="middle" font-size="11" fill="#ea580c">(primary)</text>
  <text x="200" y="243" text-anchor="middle" font-size="10" fill="#64748b">Shard 0</text>
  <rect x="118" y="255" width="164" height="22" rx="4" fill="#fed7aa" stroke="#f97316" stroke-width="1"/>
  <text x="200" y="270" text-anchor="middle" font-size="10" fill="#c2410c">PVC (data)</text>

