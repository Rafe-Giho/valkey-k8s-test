<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" width="780" height="420" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="780" height="420" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Valkey Replication (Helm / NKS)</text>

  <!-- Namespace box -->
  <rect x="20" y="55" width="740" height="340" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="75" font-size="11" fill="#6366f1" font-weight="bold">namespace: valkey</text>

  <!-- Client box -->
  <rect x="44" y="90" width="130" height="90" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="109" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Client</text>
  <text x="109" y="132" text-anchor="middle" font-size="10" fill="#64748b">(Cache Tester)</text>
  <text x="109" y="150" text-anchor="middle" font-size="10" fill="#64748b">FastAPI App</text>
  <text x="109" y="168" text-anchor="middle" font-size="10" fill="#64748b">overlay: replication</text>

  <!-- Service: valkey (write) -->
  <rect x="240" y="90" width="160" height="44" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Service: valkey</text>
  <text x="320" y="124" text-anchor="middle" font-size="10" fill="#1d4ed8">ClusterIP :6379 (write)</text>

  <!-- Service: valkey-read -->
  <rect x="240" y="148" width="160" height="44" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="320" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Service: valkey-read</text>
  <text x="320" y="182" text-anchor="middle" font-size="10" fill="#15803d">ClusterIP :6379 (read)</text>

  <!-- Arrow: client -> write service -->
  <line x1="174" y1="118" x2="238" y2="112" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="206" y="108" text-anchor="middle" font-size="9" fill="#3b82f6">write</text>

  <!-- Arrow: client -> read service -->
  <line x1="174" y1="152" x2="238" y2="165" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="206" y="165" text-anchor="middle" font-size="9" fill="#22c55e">read</text>

  <!-- Primary Pod -->
  <rect x="100" y="270" width="150" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="175" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#c2410c">Primary Pod</text>
  <text x="175" y="310" text-anchor="middle" font-size="10" fill="#ea580c">valkey-0</text>
  <text x="175" y="326" text-anchor="middle" font-size="10" fill="#64748b">write endpoint</text>
  <rect x="120" y="338" width="110" height="22" rx="4" fill="#fed7aa" stroke="#f97316" stroke-width="1"/>
  <text x="175" y="353" text-anchor="middle" font-size="10" fill="#c2410c">PVC (data)</text>

  <!-- Replica-0 Pod -->
  <rect x="310" y="270" width="150" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="385" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">Replica Pod 0</text>
  <text x="385" y="310" text-anchor="middle" font-size="10" fill="#16a34a">valkey-1</text>
  <text x="385" y="326" text-anchor="middle" font-size="10" fill="#64748b">read endpoint</text>
  <rect x="330" y="338" width="110" height="22" rx="4" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="385" y="353" text-anchor="middle" font-size="10" fill="#15803d">PVC (data)</text>

  <!-- Replica-1 Pod -->
  <rect x="520" y="270" width="150" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="595" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">Replica Pod 1</text>
  <text x="595" y="310" text-anchor="middle" font-size="10" fill="#16a34a">valkey-2</text>
  <text x="595" y="326" text-anchor="middle" font-size="10" fill="#64748b">read endpoint</text>
  <rect x="540" y="338" width="110" height="22" rx="4" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="595" y="353" text-anchor="middle" font-size="10" fill="#15803d">PVC (data)</text>

  <!-- Arrow: write service -> primary -->
  <line x1="300" y1="134" x2="210" y2="270" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-blue)"/>

  <!-- Arrow: read service -> replica-0 -->
  <line x1="340" y1="192" x2="370" y2="270" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>

  <!-- Arrow: read service -> replica-1 -->
  <line x1="380" y1="192" x2="560" y2="270" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>

  <!-- Arrow: primary -> replica-0 (replication) -->
  <line x1="250" y1="310" x2="308" y2="310" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="279" y="304" text-anchor="middle" font-size="9" fill="#f97316">복제</text>

  <!-- Arrow: primary -> replica-1 (replication) -->
  <path d="M250 330 Q385 250 518 310" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-orange)"/>

  <!-- Legend -->
  <rect x="44" y="385" width="12" height="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="62" y="396" font-size="10" fill="#1e293b">Write 경로</text>
  <rect x="140" y="385" width="12" height="12" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="158" y="396" font-size="10" fill="#1e293b">Read 경로</text>
  <rect x="236" y="385" width="12" height="12" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="254" y="396" font-size="10" fill="#1e293b">복제 (Replication)</text>
  <text x="500" y="396" font-size="10" fill="#64748b">* 자동 failover 없음</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>

</svg>
