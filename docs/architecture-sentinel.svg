<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="480" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Valkey Sentinel HA</text>

  <!-- Namespace box -->
  <rect x="20" y="55" width="780" height="400" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="75" font-size="11" fill="#a855f7" font-weight="bold">namespace: valkey-sentinel-ha</text>

  <!-- Client -->
  <rect x="44" y="90" width="130" height="80" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="109" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Client</text>
  <text x="109" y="132" text-anchor="middle" font-size="10" fill="#64748b">(Cache Tester)</text>
  <text x="109" y="150" text-anchor="middle" font-size="10" fill="#64748b">sentinel-aware</text>

  <!-- Sentinel Group box -->
  <rect x="240" y="82" width="510" height="110" rx="8" fill="#fae8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="495" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">Sentinel Group (x3)  —  감시 / 승격 결정</text>

  <!-- Sentinel 0 -->
  <rect x="258" y="108" width="140" height="70" rx="6" fill="#ffffff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="328" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">sentinel-0</text>
  <text x="328" y="146" text-anchor="middle" font-size="10" fill="#64748b">:26379</text>
  <text x="328" y="164" text-anchor="middle" font-size="10" fill="#64748b">PVC (state)</text>

  <!-- Sentinel 1 -->
  <rect x="424" y="108" width="140" height="70" rx="6" fill="#ffffff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="494" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">sentinel-1</text>
  <text x="494" y="146" text-anchor="middle" font-size="10" fill="#64748b">:26379</text>
  <text x="494" y="164" text-anchor="middle" font-size="10" fill="#64748b">PVC (state)</text>

  <!-- Sentinel 2 -->
  <rect x="590" y="108" width="140" height="70" rx="6" fill="#ffffff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="660" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">sentinel-2</text>
  <text x="660" y="146" text-anchor="middle" font-size="10" fill="#64748b">:26379</text>
  <text x="660" y="164" text-anchor="middle" font-size="10" fill="#64748b">PVC (state)</text>

  <!-- Arrow: client -> sentinel group -->
  <line x1="174" y1="130" x2="238" y2="140" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="206" y="126" text-anchor="middle" font-size="9" fill="#a855f7">질의</text>

  <!-- Sentinel -> Valkey 감시 arrows -->
  <line x1="328" y1="178" x2="220" y2="290" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-purple)"/>
  <line x1="494" y1="178" x2="430" y2="290" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-purple)"/>
  <line x1="660" y1="178" x2="640" y2="290" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-purple)"/>
  <text x="310" y="248" text-anchor="middle" font-size="9" fill="#a855f7">감시</text>

  <!-- Valkey Primary -->
  <rect x="100" y="290" width="160" height="110" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="180" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#c2410c">valkey-0</text>
  <text x="180" y="330" text-anchor="middle" font-size="11" fill="#ea580c">(primary)</text>
  <text x="180" y="348" text-anchor="middle" font-size="10" fill="#64748b">mymaster</text>
  <rect x="118" y="358" width="124" height="22" rx="4" fill="#fed7aa" stroke="#f97316" stroke-width="1"/>
  <text x="180" y="373" text-anchor="middle" font-size="10" fill="#c2410c">PVC (data)</text>

  <!-- Valkey Replica-1 -->
  <rect x="330" y="290" width="160" height="110" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="410" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">valkey-1</text>
  <text x="410" y="330" text-anchor="middle" font-size="11" fill="#16a34a">(replica)</text>
  <text x="410" y="348" text-anchor="middle" font-size="10" fill="#64748b">read</text>
  <rect x="348" y="358" width="124" height="22" rx="4" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="410" y="373" text-anchor="middle" font-size="10" fill="#15803d">PVC (data)</text>

  <!-- Valkey Replica-2 -->
  <rect x="560" y="290" width="160" height="110" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="640" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">valkey-2</text>
  <text x="640" y="330" text-anchor="middle" font-size="11" fill="#16a34a">(replica)</text>
  <text x="640" y="348" text-anchor="middle" font-size="10" fill="#64748b">read</text>
  <rect x="578" y="358" width="124" height="22" rx="4" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="373" text-anchor="middle" font-size="10" fill="#15803d">PVC (data)</text>

  <!-- Replication arrows -->
  <line x1="260" y1="335" x2="328" y2="335" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="294" y="328" text-anchor="middle" font-size="9" fill="#f97316">복제</text>
  <line x1="260" y1="345" x2="558" y2="345" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-orange)"/>

  <!-- Failover label -->
  <rect x="240" y="418" width="340" height="26" rx="6" fill="#fae8ff" stroke="#a855f7" stroke-width="1"/>
  <text x="410" y="435" text-anchor="middle" font-size="10" fill="#7e22ce">⚡ 장애 시: Sentinel이 replica 중 하나를 primary로 자동 승격</text>

  <!-- Endpoint label -->
  <text x="44" y="458" font-size="10" fill="#64748b">Sentinel: valkey-sentinel.valkey-sentinel-ha.svc.cluster.local:26379  |  Master name: mymaster</text>

  <defs>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>

</svg>
